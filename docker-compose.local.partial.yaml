  vllm-cc-proxy:
    image: node:22-slim
    container_name: vllm-cc-proxy
    init: true
    depends_on:
      vllm:
        condition: service_healthy
    ports:
      - "3456:3456"
    restart: unless-stopped
    stop_grace_period: 5m
    environment:
      NODE_OPTIONS: "--max-old-space-size=${VLLM_CC_PROXY_HEAP_MB:-4096}"
      PROXY_HOST: "0.0.0.0"
      PROXY_PORT: "3456"
      PROXY_API_KEY: "${VLLM_CC_PROXY_API_KEY:-replace-with-a-long-random-key}"

      VLLM_BASE_URL: "http://vllm:8001"
      VLLM_API_KEY: "${VLLM_API_KEY:-vllm}"

      DEFAULT_ENABLE_THINKING: "true"
      DEFAULT_TEMPERATURE: "0.65"
      DEFAULT_TOP_P: "0.90"
      DEFAULT_TOP_K: "40"
      DEFAULT_MAX_TOKENS: "8192"

      MAX_RECOVERY_ATTEMPTS: "1"
      RECOVERY_TEMPERATURE_MAX: "0.45"
      RECOVERY_MAX_TOKENS: "4096"
      RECOVERY_NETWORK_TEMPERATURE_MAX: "0.30"
      RECOVERY_NETWORK_MAX_TOKENS: "1024"
      RECOVERY_MCP_SEARCH_TOOL_PRIORITY: "${RECOVERY_MCP_SEARCH_TOOL_PRIORITY:-}"
      RECOVERY_MCP_FETCH_TOOL_PRIORITY: "${RECOVERY_MCP_FETCH_TOOL_PRIORITY:-}"
      RECOVERY_WEB_SEARCH_TOOL_NAMES: "${RECOVERY_WEB_SEARCH_TOOL_NAMES:-WebSearch}"
      RECOVERY_WEB_FETCH_TOOL_NAMES: "${RECOVERY_WEB_FETCH_TOOL_NAMES:-WebFetch}"

      HEARTBEAT_INTERVAL_MS: "10000"
      UPSTREAM_IDLE_TIMEOUT_MS: "180000"
      SEMANTIC_STALL_TIMEOUT_MS: "300000"
      TOTAL_GENERATION_TIMEOUT_MS: "1800000"
      RECOVERY_TIMEOUT_MS: "900000"
      SHUTDOWN_GRACE_MS: "300000"

      MAX_ACTIVE_REQUESTS: "2000"
      MAX_REQUEST_BODY_BYTES: "8388608"
      MAX_RESPONSE_BUFFER_BYTES: "33554432"
      MAX_TOTAL_BUFFERED_BYTES: "2147483648"
      MAX_THINKING_BYTES: "4194304"
      MAX_TOOL_ARGUMENT_BYTES: "8388608"
      MAX_CONTENT_BLOCKS: "256"
      MAX_TOOL_CALLS: "128"

      LOOP_MIN_PATTERN_SIZE: "24"
      LOOP_MAX_PATTERN_SIZE: "384"
      LOOP_MIN_COUNT: "2"
      LOOP_REASONING_CHAR_LIMIT: "24000"
      LOOP_SCAN_INTERVAL_CHARS: "64"
      LOG_LEVEL: "info"
    volumes:
      - ./vllm-cc-proxy.js:/app/vllm-cc-proxy.js:ro
    entrypoint:
      - node
      - /app/vllm-cc-proxy.js
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - >-
          fetch('http://127.0.0.1:3456/health/ready')
          .then((response)=>process.exit(response.ok?0:1))
          .catch(()=>process.exit(1))
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    networks:
      - vllm-test-network
